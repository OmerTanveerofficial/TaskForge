<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A small, distributed task queue with priority routing, retries, a worker pool, and a live dashboard." />
    <meta name="theme-color" content="#0b0b0c" />

    <meta property="og:title" content="TaskForge — Distributed Task Queue" />

    <title>TaskForge — Distributed Task Queue</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('taskforge-theme');
          var theme = stored === 'light' || stored === 'dark'
            ? stored
            : (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
          document.documentElement.classList.add(theme);
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
